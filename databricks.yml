bundle:
  name: fieldops-dq

workspace:
  host: https://dbc-f54e7c27-14cd.cloud.databricks.com
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

targets:
  dev:
    mode: development
    default: true

sync:
  include:
    - "Python/**"
    - "Databricks/**"
    - "SQL/**"
    - "README.md"
  exclude:
    - "**/__pycache__/**"
    - "**/.ipynb_checkpoints/**"
    - ".env"
    - "**/*.pyc"
    - ".databricks/**"
    - ".venv/**"
    - "**/.venv/**"